<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Luis - Portfolio</title>

    <style>
        .container {
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
            font-family: Arial;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        li {
            text-align: left;
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📝 TODO List</h1>

        <input id="taskInput" placeholder="输入任务..." />

        <button onclick="addTask()">添加</button>

        <ul id="taskList"></ul>

    </div>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let value = input.value;

            if (value === "") return;

            let li = document.createElement("li");
            li.innerText = value;

            document.getElementById("taskList").appendChild(li);

            input.value = "";
        }
    </script>

</body>

</html>
